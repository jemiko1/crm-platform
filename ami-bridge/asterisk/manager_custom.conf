; ═══════════════════════════════════════════════════════════
;  CRM AMI User - Add this to /etc/asterisk/manager_custom.conf
;  on the FreePBX server.
;
;  This file survives FreePBX module reloads (unlike manager.conf
;  which is auto-generated).
;
;  After adding, reload AMI:
;    asterisk -rx "manager reload"
;
;  Verify:
;    asterisk -rx "manager show user crm_ami"
; ═══════════════════════════════════════════════════════════

[crm_ami]
secret = CHANGE_ME_TO_STRONG_RANDOM_PASSWORD
deny = 0.0.0.0/0.0.0.0
permit = CHANGE_ME_TO_VM_IP/255.255.255.255
read = cdr,reporting,call,agent
write = call,originate,agent
writetimeout = 5000
