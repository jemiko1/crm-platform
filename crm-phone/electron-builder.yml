appId: ge.asg.crm28-phone
productName: CRM28 Phone
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/icon.ico
    to: icon.ico
win:
  target: nsis
  icon: resources/icon.ico
  # Hyphenated filename — without this, electron-builder defaults to
  # `${productName} Setup ${version}.exe` (with spaces). Spaces in
  # the URL written into latest.yml require URL-encoding by every
  # consumer (browsers, electron-updater, curl), and previous releases
  # all used hyphens — keep it consistent across versions.
  artifactName: CRM28-Phone-Setup-${version}.${ext}
nsis:
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
publish:
  provider: generic
  url: https://crm28.asg.ge/downloads/phone
