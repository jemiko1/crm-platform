appId: ge.asg.crm28-phone
productName: CRM28 Phone
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/icon.ico
    to: icon.ico
win:
  target: nsis
  icon: resources/icon.ico
  # `latest.yml` (generated by electron-builder) references this exact
  # filename in its `url:` field. If we leave the default
  # `${productName} Setup ${version}.${ext}` (which has spaces),
  # `gh release create` uploads to GitHub which silently rewrites
  # spaces to dots in the asset name (`CRM28.Phone.Setup.X.Y.Z.exe`),
  # and the URL `latest.yml` points at returns 404 → auto-update
  # fails. Pinning hyphens here keeps the file-on-disk name and the
  # name in `latest.yml` AND the GitHub asset name all identical.
  artifactName: CRM28-Phone-Setup-${version}.${ext}
nsis:
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
publish:
  provider: github
  owner: jemiko1
  repo: crm-platform
  releaseType: release
  vPrefixedTagName: true
