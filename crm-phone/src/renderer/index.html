<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM28 Phone</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        /* v1.11.0 — flipped from the old dark (#0f172a) default so
           the brief splash during session restore matches the rest
           of the app instead of flashing black first. */
        background: #f4faf7;
        color: #0f3c28;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag;
      }
      button, input, a, select { -webkit-app-region: no-drag; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.3); opacity: 0; }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
      /* Incoming-call avatar ripple — three concentric rings scale
         outward + fade out. Used in IncomingCallPopup.tsx. */
      @keyframes ringRipple {
        0%   { transform: scale(0.65); opacity: 0.55; }
        100% { transform: scale(1.15); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
