<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM28 Phone</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        /* v1.11.0 — flipped from the old dark (#0f172a) default so
           the brief splash during session restore matches the rest
           of the app instead of flashing black first. */
        background: #ffffff;
        color: #1a1a1a;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag;
      }
      button, input, a, select { -webkit-app-region: no-drag; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.3); opacity: 0; }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
      /* Incoming-call avatar ripple — three concentric rings scale
         outward + fade out. Used in IncomingCallPopup.tsx. */
      @keyframes ringRipple {
        0%   { transform: scale(0.65); opacity: 0.55; }
        100% { transform: scale(1.15); opacity: 0; }
      }

      /* Chromium's default scrollbar is thick, grey, and on-the-left
         in some RTL contexts. Force a thin, tinted, always-on-the-
         right scrollbar that matches the light emerald theme. Applies
         to every scrollable element in the renderer.

         `scrollbar-gutter: stable` reserves the gutter so content
         doesn't reflow when the bar appears, preventing the
         "elements jump 14px to the left" effect. */
      * {
        scrollbar-gutter: stable;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(15, 60, 40, 0.20);
        border-radius: 3px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: rgba(15, 60, 40, 0.30);
      }
      /* Hide the ugly corner joint between horizontal/vertical bars */
      *::-webkit-scrollbar-corner {
        background: transparent;
      }
      /* Scroll containers that deliberately hide their scrollbar
         (e.g. the history tab-chip row) opt out via
         `scrollbarWidth: "none"` in React — that sets the Firefox
         property; below covers the Chromium side. */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
