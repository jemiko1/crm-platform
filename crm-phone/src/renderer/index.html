<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM28 Phone</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        /* Teal body bg + 4px padding on L/R/B creates a teal frame
           around the app content. Top has no padding because the
           titlebar already paints teal edge-to-edge. */
        background: #115e59;
        color: #1a1a1a;
        padding: 0 4px 4px 4px;
        user-select: none;
        -webkit-app-region: drag;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      button, input, a, select { -webkit-app-region: no-drag; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.3); opacity: 0; }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
      /* Incoming-call avatar ripple — three concentric rings scale
         outward + fade out. Used in IncomingCallPopup.tsx. */
      @keyframes ringRipple {
        0%   { transform: scale(0.65); opacity: 0.55; }
        100% { transform: scale(1.15); opacity: 0; }
      }
      /* Voice activity bars — each bar pulses between a short and tall
         height. Components stagger animation-delay per bar. */
      @keyframes waveBar {
        0%, 100% { height: 4px; opacity: 0.45; }
        50%       { height: 22px; opacity: 1; }
      }

      /* Chromium's default scrollbar is thick, grey, and on-the-left
         in some RTL contexts. Force a thin, tinted, always-on-the-
         right scrollbar that matches the light emerald theme. Applies
         to every scrollable element in the renderer.

         `scrollbar-gutter: stable` is applied only to real scroll
         containers (via the `.stable-gutter` class) — applying it
         universally made body reserve an extra 6px on the right,
         breaking the teal frame symmetry. */
      .stable-gutter {
        scrollbar-gutter: stable;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(15, 60, 40, 0.20);
        border-radius: 3px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: rgba(15, 60, 40, 0.30);
      }
      /* Hide the ugly corner joint between horizontal/vertical bars */
      *::-webkit-scrollbar-corner {
        background: transparent;
      }
      /* Scroll containers that deliberately hide their scrollbar
         (e.g. the history tab-chip row) opt out via
         `scrollbarWidth: "none"` in React — that sets the Firefox
         property; below covers the Chromium side. */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
