# Workflow guidance: posts comments when labels are added to guide Cursor ↔ Claude flow.
# No secrets. No deploy. No app code.

name: Workflow Guidance

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  cursor-guidance:
    if: github.event_name == 'issues' && !github.event.issue.pull_request && github.event.label.name == 'ready-for-cursor'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment Cursor guidance
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Cursor: start implementation for this issue.\nWhen you begin work add label \'cursor-working\'.\nWhen finished open a PR.'
            });

  claude-review-guidance:
    if: github.event_name == 'pull_request' && github.event.label.name == 'ready-for-claude-review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment Claude review guidance
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Claude: review this pull request.\nIf the implementation is correct add label \'claude-approved\'.\nIf fixes are needed add label \'changes-requested\' and describe them.'
            });

  jemiko-merge-guidance:
    if: github.event_name == 'pull_request' && github.event.label.name == 'claude-approved'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment Jemiko merge guidance
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Jemiko: test the changes and merge if everything works.'
            });
